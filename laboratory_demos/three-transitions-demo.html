<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three transition concepts — prototype</title>
<style>
  :root {
    --amber: #ff9d3c;
    --cream: #f4ede0;
    --navy: #0c2340;
    --navy-deep: #071527;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #05070a;
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    height: 100%;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }
  .stage {
    position: relative;
    width: 720px;
    max-width: 92vw;
    height: 440px;
    max-height: 58vh;
    border-radius: 18px;
    background: #0a0d13;
    overflow: hidden;
    border: 1px solid #1c2438;
  }
  .scene {
    position: absolute;
    inset: 0;
    display: none;
  }
  .scene.active { display: block; }

  .destination {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    opacity: 0;
    transform: translateY(20px);
  }
  .browser-card {
    width: 78%;
    max-width: 440px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--navy);
    border: 1px solid #1c2438;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
  }
  .browser-chrome { display: flex; gap: 6px; padding: 10px 12px; background: var(--navy-deep); border-bottom: 1px solid #1c2438; }
  .dot-chrome { width: 9px; height: 9px; border-radius: 50%; background: #24344f; }
  .site-body { padding: 24px 20px 28px; }
  .site-kicker { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--amber); margin: 0 0 8px; }
  .site-title { font-size: 24px; margin: 0 0 8px; font-weight: 700; }
  .site-copy { font-size: 13px; line-height: 1.55; color: #c7d0dd; margin: 0; }
  .destination.reveal { animation: destIn .9s ease-out forwards; }
  @keyframes destIn { to { opacity: 1; transform: translateY(0); } }

  /* ================= MATCH SCENE ================= */
  .match-rig {
    position: absolute;
    left: 44%;
    top: 40%;
    width: 20px;
    height: 90px;
    transform-origin: 50% 90%;
    animation: matchIdle 2.6s ease-in-out infinite;
  }
  @keyframes matchIdle { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
  .match-rig.striking { animation: matchStrike .5s cubic-bezier(.3,0,.4,1) forwards; }
  @keyframes matchStrike {
    0% { transform: rotate(-3deg); }
    30% { transform: rotate(-28deg); }
    55% { transform: rotate(18deg); }
    75% { transform: rotate(-8deg); }
    100% { transform: rotate(0deg); }
  }
  .sparks { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  .spark { position: absolute; left: 44%; top: 42%; width: 4px; height: 4px; border-radius: 50%; background: #ffd27a; opacity: 0; }
  .spark.fire { animation: sparkFly .4s ease-out forwards; }
  @keyframes sparkFly { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(var(--sx), var(--sy)); } }

  .flame {
    position: absolute;
    left: 44%; top: 30%;
    width: 26px; height: 40px;
    transform: translate(-32%, -10%) scale(0);
    transform-origin: 50% 100%;
    opacity: 0;
    z-index: 6;
  }
  .flame.catching { animation: flameGrow .35s ease-out .35s forwards, flameFlicker .5s ease-in-out .7s infinite; }
  @keyframes flameGrow { to { opacity: 1; transform: translate(-32%,-10%) scale(1); } }
  @keyframes flameFlicker {
    0%, 100% { transform: translate(-32%,-10%) scale(1) skewX(0deg); }
    50% { transform: translate(-32%,-14%) scale(1.08,1.14) skewX(3deg); }
  }

  .warm-glow {
    position: absolute;
    left: 44%; top: 34%;
    width: 30px; height: 30px;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,157,60,.9) 0%, rgba(255,120,40,.35) 35%, transparent 70%);
    opacity: 0;
    z-index: 2;
  }
  .warm-glow.growing { animation: glowGrow 1.7s ease-out .7s forwards; }
  @keyframes glowGrow {
    0% { width: 30px; height: 30px; opacity: 0; }
    20% { opacity: 1; }
    100% { width: 1100px; height: 1100px; opacity: 1; }
  }

  .embers { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .ember { position: absolute; bottom: 20%; width: 3px; height: 3px; border-radius: 50%; background: #ffb35c; opacity: 0; }
  .ember.rise { animation: emberRise 2.2s ease-in forwards; }
  @keyframes emberRise {
    0% { opacity: 0; transform: translateY(0); }
    15% { opacity: .9; }
    100% { opacity: 0; transform: translateY(-220px) translateX(var(--ex)); }
  }

  /* ================= COIN SCENE ================= */
  .coin-rig {
    position: absolute;
    left: 50%; top: 50%;
    width: 60px; height: 60px;
    margin: -30px 0 0 -30px;
    animation: coinIdle 2.4s ease-in-out infinite;
    z-index: 10;
  }
  @keyframes coinIdle { 0%,100% { transform: rotateY(0deg); } 50% { transform: rotateY(18deg); } }
  .coin-rig.flipping { animation: coinFlip 1.1s cubic-bezier(.25,.85,.4,1) forwards; }
  @keyframes coinFlip {
    0% { transform: translateY(0) rotateY(0deg); }
    40% { transform: translateY(-90px) rotateY(900deg); }
    100% { transform: translateY(0) rotateY(1800deg); }
  }
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 2px, transparent 2px 4px);
    background-size: 100% 8px;
    opacity: 0;
    z-index: 15;
    pointer-events: none;
  }
  .scanlines.booting { animation: scanSweep 1.3s steps(24) forwards, scanFlicker 1.3s ease forwards; }
  @keyframes scanSweep { from { background-position: 0 0; } to { background-position: 0 400px; } }
  @keyframes scanFlicker {
    0% { opacity: 0; } 8% { opacity: .8; } 14% { opacity: .1; } 20% { opacity: .7; }
    26% { opacity: .2; } 34% { opacity: .55; } 100% { opacity: .35; }
  }
  .crt-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(circle, transparent 50%, rgba(0,0,0,.75) 100%);
    opacity: 0;
    z-index: 14;
    pointer-events: none;
  }
  .crt-vignette.booting { animation: vignetteIn .6s ease .3s forwards; }
  @keyframes vignetteIn { to { opacity: 1; } }
  .boot-text {
    position: absolute;
    left: 0; right: 0;
    top: 62%;
    text-align: center;
    font-family: "Courier New", monospace;
    letter-spacing: .12em;
    font-size: 15px;
    color: #7dffb0;
    opacity: 0;
    z-index: 16;
  }
  .boot-text.show { animation: bootBlink .9s steps(1) 1.1s forwards, bootFade .4s ease 1.9s forwards; }
  @keyframes bootBlink { 0%,20%,40%,60% { opacity: 0; } 10%,30%,50%,100% { opacity: 1; } }
  @keyframes bootFade { to { opacity: 0; } }
  .stage.coin-shake { animation: coinShake .35s linear; }
  @keyframes coinShake {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-3px,2px); }
    50% { transform: translate(3px,-2px); }
    75% { transform: translate(-2px,1px); }
  }

  /* ================= DOMINO SCENE ================= */
  .scene-domino {
    perspective: 1200px;
  }
  .flip-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: none;
  }
  .flip-inner.flipped { animation: worldFlip .8s cubic-bezier(.6,0,.3,1) forwards; }
  @keyframes worldFlip { to { transform: rotateX(180deg); } }
  .flip-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
  }
  .flip-back { transform: rotateX(180deg); display: flex; align-items: center; justify-content: center; }
  .domino-row {
    position: absolute;
    left: 8%; right: 8%;
    bottom: 30%;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 90px;
  }
  .domino {
    width: 20px;
    height: 84px;
    background: var(--cream);
    border: 1px solid #cfc3ab;
    border-radius: 3px;
    transform-origin: 50% 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 8px 0;
  }
  .domino-dot { width: 5px; height: 5px; border-radius: 50%; background: #b5432c; }
  .domino.tip { animation: dominoFall .26s cubic-bezier(.4,0,.2,1.3) forwards; }
  @keyframes dominoFall { to { transform: rotate(78deg); } }

  /* ================= controls ================= */
  .button-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .demo-btn {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid #24344f;
    background: var(--navy-deep);
    color: var(--cream);
    font-size: 13px;
    cursor: pointer;
  }
  .demo-btn:hover { background: #0f1c30; }
  .demo-btn:disabled { opacity: .45; cursor: default; }
  .hint { font-size: 12px; color: #5c6879; height: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage">

    <!-- MATCH -->
    <div class="scene scene-match" id="sceneMatch">
      <div class="match-rig" id="matchRig">
        <svg viewBox="0 0 20 90" width="20" height="90">
          <line x1="10" y1="20" x2="10" y2="88" stroke="#d8c9a3" stroke-width="4" stroke-linecap="round"/>
          <ellipse cx="10" cy="14" rx="7" ry="9" fill="#b5432c"/>
        </svg>
      </div>
      <div class="sparks" id="sparks"></div>
      <div class="flame" id="flame">
        <svg viewBox="0 0 40 60" width="26" height="40">
          <path d="M20,4 C6,20 4,34 14,46 C10,36 14,30 18,28 C16,38 24,42 24,50 C34,44 36,30 26,16 C28,24 24,26 22,20 C24,14 22,8 20,4 Z" fill="#ff9d3c"/>
        </svg>
      </div>
      <div class="warm-glow" id="warmGlow"></div>
      <div class="embers" id="embers"></div>
    </div>

    <!-- COIN -->
    <div class="scene scene-coin" id="sceneCoin">
      <div class="coin-rig" id="coinRig">
        <svg viewBox="0 0 60 60" width="60" height="60">
          <circle cx="30" cy="30" r="26" fill="#e8b96b" stroke="#a9762f" stroke-width="3"/>
          <text x="30" y="39" font-size="24" text-anchor="middle" fill="#a9762f" font-family="Courier New, monospace">$</text>
        </svg>
      </div>
      <div class="scanlines" id="scanlines"></div>
      <div class="crt-vignette" id="crtVignette"></div>
      <div class="boot-text" id="bootText">INSERT COIN</div>
    </div>

    <!-- DOMINO -->
    <div class="scene scene-domino" id="sceneDomino">
      <div class="flip-inner" id="flipInner">
        <div class="flip-face flip-front">
          <div class="domino-row" id="dominoRow"></div>
        </div>
        <div class="flip-face flip-back">
          <div class="browser-card">
            <div class="browser-chrome"><div class="dot-chrome"></div><div class="dot-chrome"></div><div class="dot-chrome"></div></div>
            <div class="site-body">
              <p class="site-kicker">Domino Cascade</p>
              <h1 class="site-title">Welcome in</h1>
              <p class="site-copy">The last domino flips the whole screen over to land here.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- shared destination for match + coin -->
    <div class="destination" id="destination">
      <div class="browser-card">
        <div class="browser-chrome"><div class="dot-chrome"></div><div class="dot-chrome"></div><div class="dot-chrome"></div></div>
        <div class="site-body">
          <p class="site-kicker" id="destKicker">Welcome</p>
          <h1 class="site-title">Welcome in</h1>
          <p class="site-copy" id="destCopy">This is where the destination site lands.</p>
        </div>
      </div>
    </div>

  </div>

  <div class="button-row">
    <button class="demo-btn" id="btnMatch">🔥 Match Strike</button>
    <button class="demo-btn" id="btnCoin">🪙 Coin Flip</button>
    <button class="demo-btn" id="btnDomino">🁣 Domino Cascade</button>
  </div>
  <div class="hint" id="hint">Pick an animation to preview</div>
</div>

<script>
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const buttons = {
    match: document.getElementById('btnMatch'),
    coin: document.getElementById('btnCoin'),
    domino: document.getElementById('btnDomino'),
  };
  const scenes = {
    match: document.getElementById('sceneMatch'),
    coin: document.getElementById('sceneCoin'),
    domino: document.getElementById('sceneDomino'),
  };
  const destination = document.getElementById('destination');
  const destKicker = document.getElementById('destKicker');
  const destCopy = document.getElementById('destCopy');

  function disableAll() {
    Object.values(buttons).forEach(b => b.disabled = true);
  }
  function enableAll() {
    Object.values(buttons).forEach(b => b.disabled = false);
  }
  function showScene(name) {
    Object.entries(scenes).forEach(([key, el]) => el.classList.toggle('active', key === name));
  }
  function resetAll() {
    destination.classList.remove('reveal');
    destination.style.display = 'none';

    // match reset
    const matchRig = document.getElementById('matchRig');
    matchRig.classList.remove('striking');
    document.getElementById('flame').classList.remove('catching');
    document.getElementById('warmGlow').classList.remove('growing');
    document.getElementById('sparks').innerHTML = '';
    document.getElementById('embers').innerHTML = '';

    // coin reset
    const coinRig = document.getElementById('coinRig');
    coinRig.classList.remove('flipping');
    document.getElementById('scanlines').classList.remove('booting');
    document.getElementById('crtVignette').classList.remove('booting');
    document.getElementById('bootText').classList.remove('show');
    stage.classList.remove('coin-shake');

    // domino reset
    document.getElementById('flipInner').classList.remove('flipped');
    document.getElementById('dominoRow').innerHTML = '';

    void stage.offsetWidth;
  }

  function playMatch() {
    resetAll();
    showScene('match');
    disableAll();
    hint.textContent = 'Playing…';

    const sparks = document.getElementById('sparks');
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('div');
      s.className = 'spark fire';
      const angle = Math.random() * Math.PI * 2;
      const dist = 20 + Math.random() * 26;
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      s.style.animationDelay = (Math.random() * 0.15) + 's';
      sparks.appendChild(s);
    }

    document.getElementById('matchRig').classList.add('striking');
    document.getElementById('flame').classList.add('catching');
    document.getElementById('warmGlow').classList.add('growing');

    const embers = document.getElementById('embers');
    for (let i = 0; i < 10; i++) {
      const e = document.createElement('div');
      e.className = 'ember rise';
      e.style.left = (40 + Math.random() * 20) + '%';
      e.style.setProperty('--ex', (Math.random() * 60 - 30) + 'px');
      e.style.animationDelay = (0.9 + Math.random() * 1.1) + 's';
      embers.appendChild(e);
    }

    setTimeout(() => {
      destKicker.textContent = 'Bonfire';
      destCopy.textContent = 'This is where the site lands once the fire catches.';
      destination.style.display = 'flex';
      destination.classList.add('reveal');
    }, 2500);

    setTimeout(() => {
      hint.textContent = 'Done';
      enableAll();
    }, 3600);
  }

  function playCoin() {
    resetAll();
    showScene('coin');
    disableAll();
    hint.textContent = 'Playing…';

    document.getElementById('coinRig').classList.add('flipping');

    setTimeout(() => {
      stage.classList.add('coin-shake');
      document.getElementById('scanlines').classList.add('booting');
      document.getElementById('crtVignette').classList.add('booting');
      document.getElementById('bootText').classList.add('show');
    }, 1100);

    setTimeout(() => {
      destKicker.textContent = 'Arcade';
      destCopy.textContent = 'This is where the site lands once the machine boots.';
      destination.style.display = 'flex';
      destination.classList.add('reveal');
    }, 2900);

    setTimeout(() => {
      hint.textContent = 'Done';
      enableAll();
    }, 3900);
  }

  function playDomino() {
    resetAll();
    showScene('domino');
    disableAll();
    hint.textContent = 'Playing…';

    const row = document.getElementById('dominoRow');
    const count = 10;
    for (let i = 0; i < count; i++) {
      const d = document.createElement('div');
      d.className = 'domino';
      for (let j = 0; j < 2; j++) {
        const dot = document.createElement('div');
        dot.className = 'domino-dot';
        d.appendChild(dot);
      }
      row.appendChild(d);
    }
    const dominoes = row.querySelectorAll('.domino');
    dominoes.forEach((d, i) => {
      setTimeout(() => d.classList.add('tip'), i * 150);
    });

    const lastFallEnds = (count - 1) * 150 + 260;

    setTimeout(() => {
      document.getElementById('flipInner').classList.add('flipped');
    }, lastFallEnds + 200);

    setTimeout(() => {
      hint.textContent = 'Done';
      enableAll();
    }, lastFallEnds + 200 + 900);
  }

  buttons.match.addEventListener('click', playMatch);
  buttons.coin.addEventListener('click', playCoin);
  buttons.domino.addEventListener('click', playDomino);
</script>
</body>
</html>

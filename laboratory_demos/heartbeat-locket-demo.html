<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heartbeat locket — transition prototype</title>
<style>
  :root {
    --pink: #e8637a;
    --pink-deep: #b73a52;
    --cream: #fff3ec;
    --amber: #f0b26b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #1a0f13;
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    height: 100%;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 18px;
  }
  .stage {
    position: relative;
    width: min(720px, 92vw);
    height: min(460px, 60vh);
    border-radius: 18px;
    background: radial-gradient(circle at 50% 45%, #2a141c 0%, #1a0f13 75%);
    overflow: hidden;
    border: 1px solid #3a1f28;
    perspective: 900px;
  }

  /* ---------- idle heart button ---------- */
  .heart-trigger {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 5;
  }
  .heart-trigger:disabled { cursor: default; }
  .heart-rig {
    position: relative;
    width: 110px;
    height: 96px;
    transform-style: preserve-3d;
    animation: idleBeat 2.2s ease-in-out infinite;
  }
  @keyframes idleBeat {
    0%, 100% { transform: scale(1); }
    10% { transform: scale(1.06); }
    18% { transform: scale(1); }
  }
  .half {
    position: absolute;
    top: 0;
    width: 55px;
    height: 96px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,.4));
  }
  .half-left { left: 0; transform-origin: 100% 50%; }
  .half-right { left: 55px; transform-origin: 0% 50%; }
  .seam-flash {
    position: absolute;
    top: 6%;
    bottom: 18%;
    left: 50%;
    width: 3px;
    transform: translateX(-50%);
    background: #fff3ec;
    opacity: 0;
    border-radius: 2px;
    z-index: 2;
  }
  .heart-label {
    font-size: 14px;
    letter-spacing: .04em;
    color: #e7b9c1;
  }

  /* ---------- locket glow behind heart ---------- */
  .locket-glow {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    opacity: 0;
  }
  .glow-ring {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,178,107,.55) 0%, transparent 70%);
  }

  /* ---------- photo album ---------- */
  .album {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 6;
    opacity: 0;
  }
  .album-title {
    font-size: 13px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 78px);
    grid-template-rows: repeat(2, 78px);
    gap: 10px;
  }
  .photo {
    border-radius: 6px;
    background: #fdf2e9;
    padding: 6px 6px 12px;
    box-shadow: 0 10px 22px rgba(0,0,0,.35);
    opacity: 0;
    transform: translateY(14px) scale(.85);
  }
  .photo-fill {
    width: 100%;
    height: 100%;
    border-radius: 3px;
  }

  /* ---------- controls ---------- */
  .controls { display: flex; align-items: center; gap: 10px; height: 40px; }
  .replay-btn {
    display: none;
    padding: 9px 18px;
    border-radius: 999px;
    border: 1px solid #3a1f28;
    background: #24131a;
    color: var(--amber);
    font-size: 13px;
    cursor: pointer;
  }
  .replay-btn:hover { background: #2e1820; }
  .hint { font-size: 12px; color: #6b5158; }

  /* ---------- phase: double beat (lub-dub) ---------- */
  .stage.beating .heart-rig { animation: doubleBeat 1s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes doubleBeat {
    0% { transform: scale(1); }
    14% { transform: scale(1.28); }
    26% { transform: scale(1); }
    38% { transform: scale(1.16); }
    52% { transform: scale(1); }
    100% { transform: scale(1); }
  }
  .stage.beating .seam-flash { animation: seamPulse 1s ease forwards; }
  @keyframes seamPulse {
    0%, 34% { opacity: 0; width: 3px; }
    40% { opacity: .9; width: 3px; }
    52% { opacity: 1; width: 8px; filter: blur(2px); }
    60% { opacity: 0; }
  }

  /* ---------- phase: crack + unfurl ---------- */
  .stage.opening .half-left { animation: swingLeft .9s cubic-bezier(.5,0,.3,1) .1s forwards; }
  .stage.opening .half-right { animation: swingRight .9s cubic-bezier(.5,0,.3,1) .1s forwards; }
  @keyframes swingLeft {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(112deg) translateX(-6px); opacity: .15; }
  }
  @keyframes swingRight {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(-112deg) translateX(6px); opacity: .15; }
  }
  .stage.opening .locket-glow { animation: glowIn 1.1s ease-out .2s forwards; }
  @keyframes glowIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  .stage.opening .glow-ring { animation: glowGrow 1.1s ease-out .2s forwards; }
  @keyframes glowGrow {
    0% { width: 40px; height: 40px; }
    100% { width: 520px; height: 520px; }
  }

  /* ---------- phase: album reveal ---------- */
  .stage.revealing .album { animation: albumIn .5s ease forwards; }
  @keyframes albumIn { to { opacity: 1; } }
  .stage.revealing .album-title { animation: titleIn .6s ease .1s forwards; }
  @keyframes titleIn { to { opacity: 1; } }
  .stage.revealing .photo { animation: photoPop .55s cubic-bezier(.34,1.4,.64,1) forwards; }
  @keyframes photoPop { to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage">

    <div class="locket-glow" id="locketGlow"><div class="glow-ring"></div></div>

    <button class="heart-trigger" id="heartBtn" aria-label="Open the photo album">
      <div class="heart-rig" id="heartRig">
        <svg class="half half-left" viewBox="0 0 50 96" preserveAspectRatio="none">
          <path d="M50,84 C24,64 8,46 8,28 C8,13 22,4 35,11 C42,15 47,20 50,27 Z" fill="#e8637a"/>
        </svg>
        <svg class="half half-right" viewBox="0 0 50 96" preserveAspectRatio="none">
          <path d="M0,84 C26,64 42,46 42,28 C42,13 28,4 15,11 C8,15 3,20 0,27 Z" fill="#e8637a"/>
        </svg>
        <div class="seam-flash"></div>
      </div>
      <div class="heart-label">Click the heart to open the album</div>
    </button>

    <div class="album" id="album">
      <div class="album-title">Family photos</div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>

  </div>

  <div class="controls">
    <div class="hint" id="hint">Total runtime: ~5.3s</div>
    <button class="replay-btn" id="replayBtn">↺ Replay</button>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const heartBtn = document.getElementById('heartBtn');
  const photoGrid = document.getElementById('photoGrid');
  const replayBtn = document.getElementById('replayBtn');
  const hint = document.getElementById('hint');

  const photoColors = ['#f0b26b','#e8637a','#7fb8a4','#e0c15c','#8ea7d1','#d98a5f'];

  function buildPhotos() {
    photoGrid.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const card = document.createElement('div');
      card.className = 'photo';
      card.style.animationDelay = (i * 0.09) + 's';
      const fill = document.createElement('div');
      fill.className = 'photo-fill';
      fill.style.background = photoColors[i % photoColors.length];
      card.appendChild(fill);
      photoGrid.appendChild(card);
    }
  }

  function playTimeline() {
    heartBtn.disabled = true;
    hint.textContent = 'Playing…';
    buildPhotos();

    stage.classList.add('beating');
    setTimeout(() => stage.classList.add('opening'), 950);
    setTimeout(() => stage.classList.add('revealing'), 1900);
    setTimeout(() => {
      hint.textContent = 'Done — 5.3s total';
      replayBtn.style.display = 'inline-block';
    }, 5300);
  }

  function reset() {
    stage.classList.remove('beating', 'opening', 'revealing');
    heartBtn.disabled = false;
    replayBtn.style.display = 'none';
    hint.textContent = 'Total runtime: ~5.3s';
    void stage.offsetWidth;
  }

  heartBtn.addEventListener('click', playTimeline);
  replayBtn.addEventListener('click', () => {
    reset();
    requestAnimationFrame(playTimeline);
  });
</script>
</body>
</html>
